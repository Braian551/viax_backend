name: Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build changed files manifest
        id: manifest
        shell: bash
        run: |
          set -euo pipefail

          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${{ github.sha }}"

          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            git diff-tree --no-commit-id --name-status -r "$AFTER_SHA" > /tmp/changed_raw.txt || true
          else
            git diff --name-status "$BEFORE_SHA" "$AFTER_SHA" > /tmp/changed_raw.txt || true
          fi

          # Filtrar solo archivos relevantes para deploy de backend.
          grep -E '^[AMRT]\s+' /tmp/changed_raw.txt | awk '{print $2}' \
            | grep -Ev '^\.github/|^\.git/|^vendor/|^node_modules/|^\.env$|^config/\.env$' \
            > /tmp/changed_upload.txt || true

          grep -E '^D\s+' /tmp/changed_raw.txt | awk '{print $2}' \
            | grep -Ev '^\.github/|^\.git/|^vendor/|^node_modules/|^\.env$|^config/\.env$' \
            > /tmp/changed_delete.txt || true

          UPLOAD_COUNT=$(wc -l < /tmp/changed_upload.txt || echo 0)
          DELETE_COUNT=$(wc -l < /tmp/changed_delete.txt || echo 0)

          echo "upload_count=$UPLOAD_COUNT" >> "$GITHUB_OUTPUT"
          echo "delete_count=$DELETE_COUNT" >> "$GITHUB_OUTPUT"

          echo "Archivos a subir: $UPLOAD_COUNT"
          echo "Archivos a eliminar: $DELETE_COUNT"

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync changed backend files only
        if: steps.manifest.outputs.upload_count != '0'
        run: |
          rsync -az \
            --files-from=/tmp/changed_upload.txt \
            -e "ssh -p ${{ secrets.SSH_PORT }}" \
            ./ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/viax/backend/"

      - name: Delete removed files on server
        if: steps.manifest.outputs.delete_count != '0'
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r file; do
            if [ -n "$file" ]; then
              ssh -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
                "rm -f '/var/www/viax/backend/$file'"
            fi
          done < /tmp/changed_delete.txt

      - name: Install dependencies and set permissions
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "
            cd /var/www/viax/backend && \
            if command -v composer >/dev/null 2>&1; then composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction; fi && \
            echo '${{ github.sha }}' > /var/www/viax/backend/.deploy_commit && \
            chown -R www-data:www-data /var/www/viax/backend && \
            find /var/www/viax/backend -type d -exec chmod 755 {} \\; && \
            find /var/www/viax/backend -type f -exec chmod 644 {} \\;
          "

      - name: Health check
        run: |
          curl -fsS "http://${{ secrets.SSH_HOST }}/health.php" > /dev/null
